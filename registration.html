<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 col-md-5 mx-auto">
    <h3 class="text-center mb-4">Register</h3>

    <input class="form-control mb-3" placeholder="Full Name">
    <input type="email" class="form-control mb-3" placeholder="Email">
    <input type="password" class="form-control mb-3" placeholder="Password">
    <input type="password" class="form-control mb-3" placeholder="Confirm Password">

    <button class="btn btn-success w-100 mb-3">Create Account</button>

    <div class="text-center">
      <a href="login.html">Already have an account? Login</a>
    </div>
  </div>
</div>

</body>
</html>
