<!DOCTYPE html>
<html>

<head>
  <title>Student Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">


</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container d-flex justify-content-between align-items-center">
      <h3 class="text-white mb-0">🎓 Student Management</h3>
      <div>
        <a href="login.html" class="btn btn-warning me-2">Login</a>
        <a href="registration.html" class="btn btn-success">Register</a>
      </div>
    </div>
  </nav>

  <!-- Form Card -->
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">

        <div class="card p-4">
          <h4 class="text-center mb-3">Add Student</h4>

          <input id="name" class="form-control mb-3" placeholder="Enter Name">
          <input id="age" class="form-control mb-3" placeholder="Enter Age">
          <input id="course" class="form-control mb-3" placeholder="Enter Course">

          <button onclick="addStudent()" class="btn btn-primary w-100">
            ➕ Add Student
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="container mt-5">
    <div class="card p-4">
      <h4 class="mb-3">Student List</h4>

      <table class="table table-hover">
        <thead class="table-dark">
          <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Course</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="studentList"></tbody>
      </table>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
